<!DOCTYPE html>
<html lang="ja">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

	<!-- ブラウザのタブ用 Favicon (PNG画像を指定) -->
	<link rel="icon" type="image/png" href="favicon.png">

	<!-- スマホのホーム画面に追加したときのアイコン設定 -->
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="default">
	<meta name="apple-mobile-web-app-title" content="家族予定">
	<link rel="apple-touch-icon" href="favicon.png">
	<title>洗濯・夜飯スケジュール</title>
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script src="https://cdn.tailwindcss.com"></script>
	<style>
		body {
			-webkit-tap-highlight-color: transparent;
		}

		/* 今日のカードの装飾を強化 */
		.today-highlight {
			background-color: #eff6ff !important;
			border-left: 6px solid #2563eb !important;
			/* ラインを少し太く */
			border-color: #bfdbfe;
		}
	</style>
</head>

<body class="bg-slate-50 text-slate-800 antialiased min-h-screen pb-12">

	<!-- ヘッダー -->
	<header
		class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm px-4 py-3 flex justify-between items-center">
		<h1 class="text-lg font-bold text-slate-950 flex items-center gap-2">
			📅 <span>洗濯・夜飯スケジュール</span>
		</h1>
		<span id="user-badge"
			class="bg-blue-50 text-blue-700 text-xs font-bold px-2.5 py-1 rounded-full border border-blue-200">
			読み込み中...
		</span>
	</header>

	<!-- メインコンテンツ -->
	<main class="max-w-md mx-auto px-2 pt-4">
		<!-- カレンダーコンテナ -->
		<div id="calendar-container" class="space-y-6">
			<!-- ここに JavaScript でカレンダーが生成されます -->
		</div>

		<!-- 隠し追加ボタン（最下部） -->
		<div class="text-center mt-6 mb-8">
			<button onclick="addNextWeek()"
				class="text-xs text-slate-50 hover:text-blue-500 transition-colors duration-200 select-none cursor-pointer px-3 py-1 font-bold active:scale-90"
				title="さらに次の週を表示">
				↓
			</button>
		</div>
	</main>

	<script>
		// ==========================================
		// 1. 初期設定とURLパラメータ取得
		// ==========================================
		const urlParams = new URLSearchParams(window.location.search);
		const currentUserId = parseInt(urlParams.get('id'));
		const secretKey = urlParams.get('key');
		const userNames = { 1: 'ryo', 2: 'haha', 3: 'titi' };
		const userLabels = { 1: '瞭', 2: '母', 3: '父' };

		// ★ ご自身のSupabase情報に書き換えてください！
		const SUPABASE_URL = 'https://rszzwxwpgrovqsouvuyp.supabase.co';
		const SUPABASE_KEY = 'sb_publishable_232TIVfWcH_TLDKQCxdFRw_Q4Ja3whI';
		const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

		let isAuthenticated = false;
		let datesArray = []; // 日付データ配列
		let laundryStore = {}; // 日付文字列 -> データ
		let dinnerStore = {};  // 日付文字列 -> { user_id -> not_needed }
		let isInitialLoad = true; // 初回読み込み判定フラグ

		window.addEventListener('DOMContentLoaded', checkUserAndInit);

		// ==========================================
		// 2. 身内認証
		// ==========================================
		async function checkUserAndInit() {
			if (!currentUserId || !secretKey || !userNames[currentUserId]) {
				accessDenied("URLの引数が正しくありません。");
				return;
			}

			// // ★ ここで 1 回だけセットすれば OK！
			// // 以降の select / upsert / rpc すべてにヘッダーが乗ります	// ダメだった
			// supabaseClient.rest.headers['x-secret-key'] = String(secretKey);
			// // RLS用にヘッダーに x-secret-key を付与して初期化
			// window.supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
			// 	global: {
			// 		headers: {
			// 			'x-secret-key': secretKey
			// 		}
			// 	}
			// });

			const { data, error } = await supabaseClient
				.rpc('verify_user_credentials', {
					p_user_id: currentUserId,
					p_secret_key: secretKey
				});

			if (error || !data || data.length === 0) {
				accessDenied("認証に失敗しました。IDまたはキーが間違っています。");
				return;
			}

			isAuthenticated = true;
			document.getElementById('user-badge').innerText = `${userLabels[currentUserId]}ログイン中`;

			generate3WeeksDates();
			await loadAllData();
		}

		function accessDenied(message) {
			alert(message);
			document.body.innerHTML = `<div class="p-8 text-center text-red-600 font-bold">${message}<br>正しいURLからアクセスし直してください。</div>`;
		}

		// 先週・今週・来週の合計21日分の日付を計算
		function generate3WeeksDates() {
			const today = new Date();
			const currentDay = today.getDay(); // 0:日, 1:月...

			// 今週の月曜日を基準にする
			const distanceToMonday = currentDay === 0 ? -6 : 1 - currentDay;
			const thisMonday = new Date(today);
			thisMonday.setDate(today.getDate() + distanceToMonday);

			const startPoint = new Date(thisMonday);
			startPoint.setDate(thisMonday.getDate() - 7);

			const dayNames = ['日', '月', '火', '水', '木', '金', '土'];

			for (let i = 0; i < 21; i++) {
				const d = new Date(startPoint);
				d.setDate(startPoint.getDate() + i);

				const dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
				const isToday = d.toDateString() === today.toDateString();

				let weekLabel = "今週";
				if (i < 7) weekLabel = "先週";
				else if (i >= 14) weekLabel = "来週";

				datesArray.push({
					dateStr,
					monthStr: `${d.getMonth() + 1}月`,
					dayNum: d.getDate(),
					dayName: dayNames[d.getDay()],
					isToday,
					weekLabel
				});
			}
		}

		// ==========================================
		// 3. データ取得 (SELECT)
		// ==========================================
		async function loadAllData() {
			if (!isAuthenticated) return;

			const startId = datesArray[0].dateStr;
			const endId = datesArray[datesArray.length - 1].dateStr;

			const [laundryRes, dinnerRes] = await Promise.all([
				supabaseClient.from('laundry_plans').select('*').gte('date', startId).lte('date', endId),
				supabaseClient.from('dinner_plans').select('*').gte('date', startId).lte('date', endId)
			]);

			laundryStore = {};
			if (laundryRes.data) {
				laundryRes.data.forEach(row => { laundryStore[row.date] = row; });
			}

			dinnerStore = {};
			if (dinnerRes.data) {
				dinnerRes.data.forEach(row => {
					if (!dinnerStore[row.date]) dinnerStore[row.date] = { 1: 0, 2: 0, 3: 0 };
					dinnerStore[row.date][row.user_id] = row.not_needed;
				});
			}

			renderCalendar();

			// 初回表示時のみ今日へスクロール
			if (isInitialLoad) {
				setTimeout(() => {
					scrollToToday();
					isInitialLoad = false;
				}, 300);
			}
		}

		// 隠し機能：さらに次の1週間分を追加読み込みする
		async function addNextWeek() {
			if (!isAuthenticated || datesArray.length === 0) return;

			// 現在の配列の最後の日付を取得して翌日を作る
			const lastDateParts = datesArray[datesArray.length - 1].dateStr.split('-');
			const lastDate = new Date(lastDateParts[0], lastDateParts[1] - 1, lastDateParts[2]);

			const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
			const newDates = [];

			// 7日分生成
			for (let i = 1; i <= 7; i++) {
				const d = new Date(lastDate);
				d.setDate(lastDate.getDate() + i);

				const dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;

				const dateObj = {
					dateStr,
					monthStr: `${d.getMonth() + 1}月`,
					dayNum: d.getDate(),
					dayName: dayNames[d.getDay()],
					isToday: false,
					weekLabel: "再来週以降"
				};

				datesArray.push(dateObj);
				newDates.push(dateStr);
			}

			// 新しく追加した7日分のデータのみを取得
			const startDate = newDates[0];
			const endDate = newDates[newDates.length - 1];

			const [laundryRes, dinnerRes] = await Promise.all([
				supabaseClient.from('laundry_plans').select('*').gte('date', startDate).lte('date', endDate),
				supabaseClient.from('dinner_plans').select('*').gte('date', startDate).lte('date', endDate)
			]);

			if (laundryRes.data) {
				laundryRes.data.forEach(row => { laundryStore[row.date] = row; });
			}
			if (dinnerRes.data) {
				dinnerRes.data.forEach(row => {
					if (!dinnerStore[row.date]) dinnerStore[row.date] = { 1: 0, 2: 0, 3: 0 };
					dinnerStore[row.date][row.user_id] = row.not_needed;
				});
			}

			// カレンダーを再描画
			renderCalendar();
		}

		// ==========================================
		// 4. カレンダー画面のレンダリング
		// ==========================================
		function renderCalendar() {
			const container = document.getElementById('calendar-container');
			container.innerHTML = '';

			let currentWeekGroup = '';

			datesArray.forEach(day => {
				if (currentWeekGroup !== day.weekLabel) {
					currentWeekGroup = day.weekLabel;
					const sectionHeader = document.createElement('div');
					sectionHeader.className = "text-base font-bold text-slate-500 uppercase tracking-wider pl-2 pt-3 border-t border-slate-200 mt-5 first:mt-0 first:border-0";
					sectionHeader.innerText = `${day.weekLabel} (${day.monthStr})`;
					container.appendChild(sectionHeader);
				}

				const plan = laundryStore[day.dateStr] || { wash_user_1: 0, wash_user_2: 0 };
				const dinners = dinnerStore[day.dateStr] || { 1: 0, 2: 0, 3: 0 };

				const dayRow = document.createElement('div');
				dayRow.className = `bg-white border border-slate-200 rounded-xl p-3.5 flex flex-col gap-3 transition-all shadow-sm ${day.isToday ? 'today-highlight shadow-blue-100/50' : ''}`;

				const dayColor = day.dayName === '日' ? 'text-red-500' : day.dayName === '土' ? 'text-blue-500' : 'text-slate-500';

				const isUser1Washing = plan.wash_user_1 >= 1;
				const isUser2Washing = plan.wash_user_2 >= 1;

				// 操作権限の判定（代理操作なし、本人のみ）
				const canEditUser1Laundry = (currentUserId === 1);
				const canEditUser2Laundry = (currentUserId === 2);

				dayRow.innerHTML = `
          <!-- 日付・曜日表示 -->
          <div class="flex justify-between items-center border-b border-slate-100 pb-2">
            <div class="flex items-center gap-2">
              <span class="text-2xl font-bold text-slate-900">${day.dayNum}日</span>
              <span class="text-2xl font-bold ${dayColor}">(${day.dayName})</span>
              ${day.isToday ? '<span class="bg-blue-600 text-white text-xs px-2 py-0.5 rounded font-bold tracking-wider">今日</span>' : ''}
            </div>
          </div>

          <!-- 各種操作ボタン -->
          <div class="grid grid-cols-12 gap-2 items-center">
            
            <!-- 洗濯エリア (横幅6/12) -->
            <div class="col-span-6 flex flex-col gap-2 border-r border-slate-100 pr-2">
              
              <!-- 自分 (ryo) の洗濯ボタン -->
              <div class="flex items-center justify-between gap-1">
                <span class="text-base font-bold ${canEditUser1Laundry ? 'text-blue-600' : 'text-slate-400'} w-8"> 
                  ${canEditUser1Laundry ? '👉瞭' : '瞭'}
                </span>
                <div class="flex bg-slate-100 p-0.5 rounded-lg flex-1 ${canEditUser1Laundry ? 'ring-2 ring-blue-500/50' : ''}">
                  <button onclick="${canEditUser1Laundry ? `setWash('${day.dateStr}', 1, 0)` : 'void(0)'}" 
                          class="text-base flex-1 py-1.5 rounded-md text-center transition-all ${!isUser1Washing ? 'bg-white text-slate-800 font-bold shadow-sm' : 'text-slate-400'}"> 
                    無し
                  </button>
                  <button onclick="${canEditUser1Laundry ? `setWash('${day.dateStr}', 1, 1)` : 'void(0)'}" 
                          class="text-base flex-1 py-1.5 rounded-md text-center transition-all ${isUser1Washing ? 'bg-emerald-500 text-white font-bold shadow-sm' : 'text-slate-600'}"> 
                    洗濯
                  </button>
                </div>
              </div>

              <!-- 母 (haha) の洗濯ボタン -->
              <div class="flex items-center justify-between gap-1">
                <span class="text-base font-bold ${canEditUser2Laundry ? 'text-indigo-600' : 'text-slate-400'} w-8"> 
                  ${canEditUser2Laundry ? '👉母' : '母'}
                </span>
                <div class="flex bg-slate-100 p-0.5 rounded-lg flex-1 ${canEditUser2Laundry ? 'ring-2 ring-indigo-500/50' : ''}">
                  <button onclick="${canEditUser2Laundry ? `setWash('${day.dateStr}', 2, 0)` : 'void(0)'}" 
                          class="text-base flex-1 py-1.5 rounded-md text-center transition-all ${!isUser2Washing ? 'bg-white text-slate-800 font-bold shadow-sm' : 'text-slate-400'}"> 
                    無し
                  </button>
                  <button onclick="${canEditUser2Laundry ? `setWash('${day.dateStr}', 2, 1)` : 'void(0)'}" 
                          class="text-base flex-1 py-1.5 rounded-md text-center transition-all ${isUser2Washing ? 'bg-fuchsia-600 text-white font-bold shadow-sm' : 'text-slate-600'}"> 
                    洗濯
                  </button>
                </div>
              </div>

            </div>

            <!-- 夜ごはんエリア (横幅6/12) -->
            <div class="col-span-6 flex flex-col gap-1 pl-2">
              <div class="text-xs text-slate-500 text-center font-bold mb-0.5">夜ごはん不要❌</div> 
              <div class="flex gap-1 justify-center">
                ${[1, 2, 3].map(uid => {
					const isNotNeeded = dinners[uid] === 1;
					const canEditDinner = (currentUserId === uid);

					const activeClass = isNotNeeded ? 'bg-red-500 text-white border-red-600' : 'bg-white text-slate-700 border-slate-200';
					const focusClass = canEditDinner ? 'ring-2 ring-blue-500 font-black scale-105 z-10' : 'opacity-90';

					return `
                    <button onclick="${canEditDinner ? `toggleDinner('${day.dateStr}', ${uid})` : 'void(0)'}" 
                            class="text-base flex-1 py-2 rounded-lg font-bold border transition-all text-center shadow-sm ${activeClass} ${focusClass}"> 
                      ${uid === 1 ? '瞭' : uid === 2 ? '母' : '父'}
                    </button>
                  `;
				}).join('')}
              </div>
            </div>

          </div>
        `;
				container.appendChild(dayRow);
			});
		}

		// ==========================================
		// 5. データ保存・更新処理 (UPSERT)
		// ==========================================
		// URLパラメータからいつでもキー付きのクライアントを作れるヘルパー関数
		function getAuthenticatedClient() {
			const urlParams = new URLSearchParams(window.location.search);
			const key = urlParams.get('key') || secretKey || '';
			return supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
				global: {
					headers: {
						'x-secret-key': String(key)
					}
				}
			});
		}

		async function setWash(dateStr, type, value) {
			if (!isAuthenticated) return;

			const currentVal = laundryStore[dateStr] || { wash_user_1: 0, wash_user_2: 0 };
			const nextW1 = type === 1 ? value : currentVal.wash_user_1;
			const nextW2 = type === 2 ? value : currentVal.wash_user_2;

			// ★ getAuthenticatedClient() を使って呼ぶ！
			const { error } = await getAuthenticatedClient()
				.from('laundry_plans')
				.upsert({
					date: dateStr,
					wash_user_1: nextW1,
					wash_user_2: nextW2,
					option_type: 0,
					updated_by: Number(currentUserId),
					updated_at: new Date().toISOString()
				}, { onConflict: 'date' });

			if (error) {
				console.error("保存エラー詳細:", error);
				alert("保存に失敗しました。");
			} else {
				laundryStore[dateStr] = { date: dateStr, wash_user_1: nextW1, wash_user_2: nextW2, option_type: 0 };
				renderCalendar();
			}
		}

		async function toggleDinner(dateStr, targetUserId) {
			if (!isAuthenticated) return;

			if (!dinnerStore[dateStr]) {
				dinnerStore[dateStr] = { 1: 0, 2: 0, 3: 0 };
			}

			const currentVal = dinnerStore[dateStr][targetUserId];
			const newVal = currentVal === 1 ? 0 : 1;

			// ★ getAuthenticatedClient() を使って呼ぶ！
			const { error } = await getAuthenticatedClient()
				.from('dinner_plans')
				.upsert({
					date: dateStr,
					user_id: targetUserId,
					not_needed: newVal,
					updated_by: Number(currentUserId),
					updated_at: new Date().toISOString()
				}, { onConflict: 'date,user_id' });

			if (error) {
				console.error("保存エラー詳細:", error);
				alert("保存に失敗しました。");
			} else {
				dinnerStore[dateStr][targetUserId] = newVal;
				renderCalendar();
			}
		}

		// ==========================================
		// 6. 今日の日付へスムーズスクロールする関数
		// ==========================================
		function scrollToToday() {
			const todayEl = document.querySelector('.today-highlight');
			if (todayEl) {
				todayEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
			}
		}
	</script>

	<!-- 画面右下に固定する「今日にジャンプ」ボタン -->
	<button id="jump-to-today-btn" onclick="scrollToToday()"
		class="fixed bottom-6 right-6 bg-blue-600 text-white font-bold p-3 rounded-full shadow-lg border border-blue-500 flex items-center justify-center gap-1 active:scale-95 transition-transform z-50">
		<span>📅</span>
		<span class="text-xs pr-1">今日へ</span>
	</button>
</body>

</html>
