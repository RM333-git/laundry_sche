<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家族の予定共有</title>
  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Supabase JS (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen p-4 flex flex-col items-center">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-sm p-6 border border-slate-100">
    <!-- ユーザー表示 -->
    <div class="flex justify-between items-center border-b border-slate-100 pb-4 mb-6">
      <h1 class="text-xl font-bold">🧺 家族の予定</h1>
      <span id="user-badge" class="px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-xs font-semibold">読み込み中...</span>
    </div>

    <!-- 日付選択（簡易的に今日〜3日後を選べるように） -->
    <div class="mb-6">
      <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">日付を選択</label>
      <select id="date-select" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-medium focus:outline-none focus:ring-2 focus:ring-blue-500">
        <!-- JSで動的に日付を入れます -->
      </select>
    </div>

    <!-- 洗濯プランカード -->
    <div class="bg-blue-50/50 border border-blue-100 rounded-2xl p-4 mb-4">
      <h2 class="font-bold text-blue-900 mb-3 flex items-center gap-2">🧺 洗濯の予定</h2>
      
      <div class="space-y-3">
        <div>
          <span class="text-xs text-blue-700 font-medium block mb-1">前の予定（第1希望）</span>
          <div class="grid grid-cols-3 gap-2" id="wash1-buttons">
            <button onclick="setWash(1, 0)" id="w1-0" class="py-2 rounded-xl bg-white border border-slate-200 text-sm font-medium">なし</button>
            <button onclick="setWash(1, 1)" id="w1-1" class="py-2 rounded-xl bg-white border border-slate-200 text-sm font-medium">自分</button>
            <button onclick="setWash(1, 2)" id="w1-2" class="py-2 rounded-xl bg-white border border-slate-200 text-sm font-medium">母</button>
          </div>
        </div>

        <div>
          <span class="text-xs text-blue-700 font-medium block mb-1">後の予定（第2希望）</span>
          <div class="grid grid-cols-3 gap-2" id="wash2-buttons">
            <button onclick="setWash(2, 0)" id="w2-0" class="py-2 rounded-xl bg-white border border-slate-200 text-sm font-medium">なし</button>
            <button onclick="setWash(2, 1)" id="w2-1" class="py-2 rounded-xl bg-white border border-slate-200 text-sm font-medium">自分</button>
            <button onclick="setWash(2, 2)" id="w2-2" class="py-2 rounded-xl bg-white border border-slate-200 text-sm font-medium">母</button>
          </div>
        </div>

        <div class="flex items-center justify-between pt-2 border-t border-blue-100">
          <span class="text-xs text-blue-700 font-medium">早オプション</span>
          <input type="checkbox" id="option-early" onchange="toggleEarlyOption()" class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
        </div>
      </div>
    </div>

    <!-- 夜ごはんカード -->
    <div class="bg-emerald-50/50 border border-emerald-100 rounded-2xl p-4">
      <h2 class="font-bold text-emerald-900 mb-3 flex items-center gap-2">🍳 夜ごはん不要フラグ</h2>
      <p class="text-xs text-emerald-700 mb-3">タップすると「夜ごはん不要（赤）」に切り替わります</p>
      
      <div class="grid grid-cols-3 gap-2">
        <button onclick="toggleDinner(1)" id="dinner-1" class="py-3 rounded-xl bg-white border border-slate-200 text-sm font-medium">自分</button>
        <button onclick="toggleDinner(2)" id="dinner-2" class="py-3 rounded-xl bg-white border border-slate-200 text-sm font-medium">母</button>
        <button onclick="toggleDinner(3)" id="dinner-3" class="py-3 rounded-xl bg-white border border-slate-200 text-sm font-medium">父</button>
      </div>
    </div>

  </div>

  <script>
    // ==========================================
    // 1. URLパラメータの取得
    // ==========================================
    const urlParams = new URLSearchParams(window.location.search);
    const currentUserId = parseInt(urlParams.get('id'));
    const secretKey = urlParams.get('key');

    const userNames = { 1: 'ryo(自分)', 2: 'haha(母)', 3: 'titi(父)' };
    
    // ★あなたのSupabase情報に書き換えてください！
    const SUPABASE_URL = 'https://rszzwxwpgrovqsouvuyp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_232TIVfWcH_TLDKQCxdFRw_Q4Ja3whI';

    // 通常の初期化（特殊なヘッダーは使わない）
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // データ保持用の一時変数
    let currentLaundry = { wash_user_1: 0, wash_user_2: 0, option_type: 0 };
    let currentDinners = { 1: 0, 2: 0, 3: 0 };
    let isAuthenticated = false; // 認証フラグ

    // 起動時にまず「身内チェック（認証）」を行う
    window.addEventListener('DOMContentLoaded', checkUserAndLoad);
    document.getElementById('date-select').addEventListener('change', loadData);

    // ==========================================
    // 2. 確実な身内チェック（認証）関数
    // ==========================================
    async function checkUserAndLoad() {
      if (!currentUserId || !secretKey || !userNames[currentUserId]) {
        accessDenied("URLの引数が正しくありません。");
        return;
      }


		// 【デバッグ用】実際にプログラムが読み取っている値をアラートで確認します
      alert(`デバッグ確認:\nURLのID: [${currentUserId}] (型: ${typeof currentUserId})\nURLのKey: [${secretKey}] (型: ${typeof secretKey})`);

      // usersテーブルに、URLのidとkeyが一致するデータがあるか直接検索する
      const { data: user, error } = await supabaseClient
        .from('users')
        .select('name')
        .eq('id', currentUserId)
        .eq('secret_key', secretKey)
        .maybeSingle();

      // 【デバッグ用】Supabaseからどんなエラーが返ってきているか確認します
      if (error) {
        alert(`Supabaseエラーが発生しました:\nコード: ${error.code}\nメッセージ: ${error.message}`);
      }
      
      console.log("取得データ:", user); // 開発者ツールのコンソール用

      if (error || !user) {
        // 一致するユーザーがいなければアクセス拒否！
        accessDenied("認証に失敗しました。IDまたはキーが間違っています。");
        return;
      }

      // 認証成功！
      isAuthenticated = true;
      document.getElementById('user-badge').innerText = userNames[currentUserId];
      
      // 日付の初期化とデータ読み込み
      initDateSelect();
      await loadData();
    }

    function accessDenied(message) {
      alert(message);
      // 画面全体を「アクセス拒否」の表示に変えて操作できなくする
      document.body.innerHTML = `<div class="p-8 text-center text-red-600 font-bold">${message}<br>正しいURLからアクセスし直してください。</div>`;
    }

    // 日付選択の初期化
    function initDateSelect() {
      const dateSelect = document.getElementById('date-select');
      const today = new Date();
      for (let i = 0; i < 7; i++) {
        const d = new Date(today);
        d.setDate(today.getDate() + i);
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        const dateStr = `${yyyy}-${mm}-${dd}`;
        
        const option = document.createElement('option');
        option.value = dateStr;
        option.innerText = i === 0 ? `今日 (${mm}/${dd})` : i === 1 ? `明日 (${mm}/${dd})` : `${mm}/${dd}`;
        dateSelect.appendChild(option);
      }
    }

    // ==========================================
    // 3. データ読み込み (SELECT)
    // ==========================================
    async function loadData() {
      if (!isAuthenticated) return; // 認証されていなければ何もしない
      
      const selectedDate = document.getElementById('date-select').value;
      if (!selectedDate) return;

      // ① 洗濯データの取得
      const { data: laundryData } = await supabaseClient
        .from('laundry_plans')
        .select('*')
        .eq('date', selectedDate)
        .maybeSingle();

      currentLaundry = laundryData || { wash_user_1: 0, wash_user_2: 0, option_type: 0 };
      updateLaundryUI();

      // ② 夜ごはんデータの取得
      const { data: dinnerData } = await supabaseClient
        .from('dinner_plans')
        .select('*')
        .eq('date', selectedDate);

      currentDinners = { 1: 0, 2: 0, 3: 0 }; 
      if (dinnerData) {
        dinnerData.forEach(row => {
          currentDinners[row.user_id] = row.not_needed;
        });
      }
      updateDinnerUI();
    }

    // ==========================================
    // 4. UIの表示更新
    // ==========================================
    function updateLaundryUI() {
      [0, 1, 2].forEach(v => {
        const btn = document.getElementById(`w1-${v}`);
        btn.className = "py-2 rounded-xl text-sm font-medium transition-all " + 
          (currentLaundry.wash_user_1 === v ? "bg-blue-600 text-white shadow-sm font-bold border-blue-600" : "bg-white border border-slate-200 text-slate-700");
      });
      [0, 1, 2].forEach(v => {
        const btn = document.getElementById(`w2-${v}`);
        btn.className = "py-2 rounded-xl text-sm font-medium transition-all " + 
          (currentLaundry.wash_user_2 === v ? "bg-indigo-600 text-white shadow-sm font-bold border-indigo-600" : "bg-white border border-slate-200 text-slate-700");
      });
      document.getElementById('option-early').checked = (currentLaundry.option_type === 1);
    }

    function updateDinnerUI() {
      [1, 2, 3].forEach(uid => {
        const btn = document.getElementById(`dinner-${uid}`);
        const isNotNeeded = currentDinners[uid] === 1;
        btn.className = "py-3 rounded-xl text-sm font-bold transition-all border " + 
          (isNotNeeded ? "bg-red-500 text-white border-red-600 shadow-sm" : "bg-white text-slate-700 border-slate-200");
        btn.innerText = (uid === 1 ? '自分' : uid === 2 ? '母' : '父') + (isNotNeeded ? '❌' : ' 🍚');
      });
    }

    // ==========================================
    // 5. データ保存・更新 (UPSERT)
    // ==========================================
    async function setWash(type, value) {
      if (!isAuthenticated) return;
      
      if (type === 1) currentLaundry.wash_user_1 = value;
      if (type === 2) currentLaundry.wash_user_2 = value;

      const selectedDate = document.getElementById('date-select').value;

      const { error } = await supabaseClient
        .from('laundry_plans')
        .upsert({
          date: selectedDate,
          wash_user_1: currentLaundry.wash_user_1,
          wash_user_2: currentLaundry.wash_user_2,
          option_type: currentLaundry.option_type,
          updated_by: currentUserId,
          updated_at: new Date().toISOString()
        });

      if (error) alert("保存に失敗しました。");
      else updateLaundryUI();
    }

    async function toggleEarlyOption() {
      currentLaundry.option_type = document.getElementById('option-early').checked ? 1 : 0;
      setWash(0, 0); 
    }

    async function toggleDinner(targetUserId) {
      if (!isAuthenticated) return;
      
      const newValue = currentDinners[targetUserId] === 1 ? 0 : 1;
      const selectedDate = document.getElementById('date-select').value;

      const { error } = await supabaseClient
        .from('dinner_plans')
        .upsert({
          date: selectedDate,
          user_id: targetUserId,
          not_needed: newValue,
          updated_by: currentUserId,
          updated_at: new Date().toISOString()
        }, {
          onConflict: 'date,user_id'
        });

      if (error) alert("保存に失敗しました。");
      else {
        currentDinners[targetUserId] = newValue;
        updateDinnerUI();
      }
    }
  </script>
</body>
</html>
